name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: node build.js

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::630764144880:role/prod-orbfall-deploy
          aws-region: us-east-1

      - name: Sync to S3
        run: |
          aws s3 sync ./dist/orbfall s3://gusto4tech-prod-orbfall-static/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "*.json" \
            --exclude "service-worker.js"
          aws s3 sync ./dist/orbfall s3://gusto4tech-prod-orbfall-static/ \
            --delete \
            --cache-control "no-cache" \
            --include "*.html" \
            --include "*.json" \
            --include "service-worker.js"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id EFPCI3NCVKM46 \
            --paths "/*"
